apiVersion: apps/v1
kind: DaemonSet

metadata:
  labels:
    app: mydaemon
  name: mydaemon-blue

spec:
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: mydaemon
  template:
    metadata:
      labels:
        app: mydaemon
    spec:
      containers:
      - image: mjbright/k8s-demo:2
        name: k8s-demo
